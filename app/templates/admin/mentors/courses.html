{% extends "base.html" %}

{% block title %}Управление курсами ментора — StudyBuddy{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
{% endblock %}

{% block content %}
<div class="container" style="margin-top: 2rem;">
    <div class="admin-header">
        <h1>Курсы ментора: {{ mentor.username }}</h1>
        <a href="{{ url_for('admin.mentors') }}" class="btn btn-outline">← Назад к менторам</a>
    </div>

    <div class="card" style="margin-top: 2rem;">
        <form method="POST">
            <div class="form-group">
                <label style="font-weight: 500; margin-bottom: 0.75rem; display: block;">Выберите курсы для ментора:</label>
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem;">
                    {% for course in all_courses %}
                    <label style="display: flex; align-items: center; gap: 0.75rem; padding: 1rem; border: 1px solid var(--border); border-radius: 0.5rem; cursor: pointer; transition: all 0.2s;">
                        <input type="checkbox" name="course_ids" value="{{ course.id }}" {% if course.id in assigned_course_ids %}checked{% endif %} style="width: 1.25rem; height: 1.25rem;">
                        <div>
                            <div style="font-weight: 500;">{{ course.title }}</div>
                            <div style="font-size: 0.875rem; color: var(--text-muted);">
                                {{ course.lessons|length }} уроков
                            </div>
                        </div>
                    </label>
                    {% endfor %}
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Сохранить</button>
        </form>
    </div>
</div>
{% endblock %}
