services:
  - type: web
    name: studybuddy
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.8
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: studybuddy-db
          property: connectionString

databases:
  - name: studybuddy-db
    databaseName: studybuddy
    user: studybuddy
    plan: free
